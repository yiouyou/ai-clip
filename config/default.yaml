# ai-clip default configuration. Override per-machine via env vars (see .env.example)
# or by passing --config path/to/file.yaml.

data_dir: ./data
aspect_ratio: "9:16"   # 9:16 portrait (Shorts/Reels/抖音) | 16:9 landscape

whisper:
  model_size: medium    # tiny|base|small|medium|large-v3
  compute_type: auto    # auto -> int8 on CPU, float16 on GPU
  language: null         # null = autodetect

llm:
  base_url: https://api.deepseek.com/v1   # full base incl. /v1
  model: deepseek-v4-pro                    # OpenAI: https://api.openai.com/v1 + gpt-5.5

assets:
  image_provider: auto        # auto|comfyui|smart_illustrator|prompt_only
  video_provider: prompt_only  # prompt_only|comfyui
  comfyui_url: http://127.0.0.1:8188
  smart_illustrator_dir: ""       # optional path to smart-illustrator checkout/skill
  smart_illustrator_script: ""    # optional direct path to scripts/generate-image.ts
  smart_illustrator_provider: ""  # openrouter|gemini, empty = script auto-detects
  smart_illustrator_model: ""
  smart_illustrator_candidates: 1

tts:
  base_url: https://api.xiaomimimo.com/v1
  model: mimo-v2.5-tts-voiceclone   # mimo-v2.5-tts | -voiceclone | -voicedesign
  voice: Chloe                       # preset voice (used when not cloning)
  clone_from_source: true            # clone the source clip's speaker
  reference_seconds: 10.0            # reference snippet length for cloning

pair:
  base_url: ""     # set from NEWAPP_URL; OpenAI-compatible base should include /v1
  api_key: ""      # set from NEWAPP_API_KEY
  models:
    - gpt-5.5
    - claude-sonnet-4-6
    - claude-opus-4.8
  deepseek_base_url: https://api.deepseek.com/v1
  deepseek_api_key: ""  # set from DEEPSEEK_API_KEY
  deepseek_models:
    - deepseek-4-pro
  timeout: 120.0

source_research:
  tavily_api_key: ""  # set from TAVILY_API_KEY
  max_searches: 2     # code clamps to 1-3 per run
  max_results: 5
  search_depth: basic
  timeout: 30.0

radar:
  channels_path: config/channels.yaml
  feedback_path: config/radar-feedback.yaml
  top_n: 3
  shortlist_n: 9  # metadata candidates enriched before content reranking to final top_n
  channel_limit: 20
  bilibili_detail_limit: 8  # max recent Bilibili entries expanded after a flat listing
  channel_timeout_sec: 60  # daily collect/run skip a stuck channel after this; 0 disables
  channel_workers: 4       # parallel channel collectors when timeout is enabled
  since_days: 2
  max_duration_sec: 900.0
  timezone: Asia/Shanghai
  transcribe_missing: true  # if no subtitles, download bestaudio and use faster-whisper
  transcribe_model_size: small  # radar speed default; main extract still uses whisper.model_size
  auto_research: true
  auto_research_min_risk: high  # low|medium|high
  auto_research_max_searches: 2  # still subject to the global hard cap of 3
